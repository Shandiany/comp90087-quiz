<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
  h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
  .stats { text-align: center; color: #86868b; font-size: 14px; margin-bottom: 24px; }
  .stats span { margin: 0 8px; }
  .progress-bar { height: 4px; background: #e5e5e7; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { height: 100%; background: #0071e3; border-radius: 2px; transition: width 0.4s ease; }
  .card { background: #fff; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .q-number { font-size: 13px; color: #86868b; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { padding: 14px 18px; border: 2px solid #e5e5e7; border-radius: 12px; cursor: pointer; font-size: 16px; line-height: 1.4; transition: all 0.2s; user-select: none; }
  .option:hover { border-color: #0071e3; background: #f0f7ff; }
  .option.correct { border-color: #34c759; background: #edfbf0; color: #1a7d2f; }
  .option.wrong { border-color: #ff3b30; background: #fff0ef; color: #c0291f; }
  .option.reveal { border-color: #34c759; background: #edfbf0; }
  .option.disabled { pointer-events: none; }
  .explanation { margin-top: 16px; padding: 14px 18px; background: #f5f5f7; border-radius: 12px; font-size: 14px; line-height: 1.5; color: #515154; display: none; }
  .nav-bar { display: flex; justify-content: center; gap: 12px; margin-top: 24px; }
  .btn-nav { padding: 12px 32px; background: #0071e3; color: #fff; border: none; border-radius: 24px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
  .btn-nav:hover { background: #0062cc; }
  .btn-nav:disabled { background: #c7c7cc; cursor: default; }
  .btn-nav.secondary { background: #e5e5e7; color: #1d1d1f; }
  .btn-nav.secondary:hover { background: #d1d1d6; }
  .btn-nav.secondary:disabled { color: #c7c7cc; }
  .btn-remove-wrong { margin-top: 12px; padding: 8px 20px; background: #fff0ef; color: #ff3b30; border: 1.5px solid #ff3b30; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .btn-remove-wrong:hover { background: #ff3b30; color: #fff; }
  .result-card { text-align: center; }
  .result-card h2 { font-size: 24px; margin-bottom: 16px; }
  .result-score { font-size: 64px; font-weight: 700; color: #0071e3; margin: 16px 0; }
  .wrong-list { text-align: left; margin-top: 24px; }
  .wrong-list h3 { font-size: 18px; margin-bottom: 16px; color: #ff3b30; }
  .wrong-item { padding: 16px; background: #f5f5f7; border-radius: 12px; margin-bottom: 12px; font-size: 14px; line-height: 1.6; }
  .wrong-item .wi-q { font-weight: 600; margin-bottom: 6px; }
  .wrong-item .wi-your { color: #ff3b30; }
  .wrong-item .wi-correct { color: #34c759; }
  .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .btn-secondary { padding: 12px 28px; background: #e5e5e7; color: #1d1d1f; border: none; border-radius: 24px; font-size: 16px; cursor: pointer; }
  .btn-secondary:hover { background: #d1d1d6; }
  .mode-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .mode-btn { padding: 8px 20px; border: 2px solid #e5e5e7; background: #fff; border-radius: 20px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .mode-btn:hover { border-color: #0071e3; }
  .mode-btn.active { border-color: #0071e3; background: #0071e3; color: #fff; }
  .shuffle-label { font-size: 13px; color: #86868b; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .shuffle-label input { cursor: pointer; }
  .loading { text-align: center; padding: 40px; color: #86868b; }

  /* Sidebar */
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; background: #fff; z-index: 999; transition: left 0.3s ease; box-shadow: 4px 0 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
  .sidebar.open { left: 0; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid #e5e5e7; display: flex; justify-content: space-between; align-items: center; }
  .sidebar-header h2 { font-size: 18px; font-weight: 700; }
  .sidebar-close { width: 32px; height: 32px; border: none; background: #f5f5f7; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #86868b; transition: all 0.2s; }
  .sidebar-close:hover { background: #e5e5e7; color: #1d1d1f; }
  .sidebar-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-section-title { font-size: 12px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .sidebar-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; line-height: 1.4; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .sidebar-item:hover { background: #f5f5f7; }
  .sidebar-item.active { background: #e8f2ff; color: #0071e3; font-weight: 600; }
  .sidebar-item .si-right { display: flex; align-items: center; gap: 6px; }
  .sidebar-item .si-count { font-size: 12px; color: #86868b; background: #f5f5f7; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .sidebar-item.active .si-count { background: #d0e4ff; color: #0071e3; }
  .btn-export { width: 26px; height: 26px; border: none; background: #f5f5f7; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #86868b; transition: all 0.2s; flex-shrink: 0; }
  .btn-export:hover { background: #e5e5e7; color: #1d1d1f; }
  .btn-export svg { width: 14px; height: 14px; }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1d1d1f; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 1100; opacity: 0; transition: all 0.3s ease; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid #e5e5e7; }

  /* Menu toggle button */
  .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 997; width: 44px; height: 44px; border: none; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .menu-toggle:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); transform: scale(1.05); }
  .menu-toggle svg { width: 20px; height: 20px; color: #1d1d1f; }
  .menu-toggle .badge { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; background: #0071e3; color: #fff; border-radius: 9px; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
</style>
</head>
<body>
<!-- Sidebar toggle -->
<button class="menu-toggle" onclick="toggleSidebar()" id="menuToggle">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  <span class="badge" id="bankBadge" style="display:none"></span>
</button>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>题库</h2>
    <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-section">
      <div class="sidebar-section-title">题库选择</div>
      <div id="topicList"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">模式</div>
      <div class="sidebar-item" id="modeAll" onclick="setMode('all')">
        <span>全部题目</span>
      </div>
      <div class="sidebar-item" id="modeWrong" onclick="setMode('wrong')">
        <span>只做错题</span>
        <span class="si-count" id="wrongBadge">0</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">设置</div>
      <div class="sidebar-item" onclick="document.getElementById('shuffleCheck').click()">
        <span>随机顺序</span>
        <input type="checkbox" id="shuffleCheck" checked style="pointer-events:none">
      </div>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="sidebar-item" onclick="clearWrongs()" style="color:#ff3b30">
      <span>清除所有错题记录</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Main content -->
<div class="container">
  <h1>MCQ Quiz</h1>
  <div class="stats">
    <span>进度: <b id="statCur">0</b>/<b id="statTotal">0</b></span>
    <span>正确: <b id="statRight" style="color:#34c759">0</b></span>
    <span>错误: <b id="statWrong" style="color:#ff3b30">0</b></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="quizArea"><div class="loading">加载题目中...</div></div>
</div>

<script>
// ============================================================
// 题库注册表：在这里添加你的题目文件
// 格式: { name: "显示名称", file: "文件名.js" }
// ============================================================
const QUESTION_BANKS = [
  { name: "Week 1: History of AI", file: "questions/week1.js" },
  { name: "Week 2: AI Ethics & Principles", file: "questions/week2.js" },
  { name: "Week 3: Trolley Problems & Moral Theory", file: "questions/week3.js" },
];
// ============================================================

const STORAGE_KEY = "mcq_wrong_records";
let allBanks = {};
let selectedTopics = new Set();
let currentMode = 'all';
let currentQuiz = [];
let currentIndex = 0;
let rightCount = 0;
let wrongCount = 0;
let sessionWrongs = [];
let answered = []; // track each question's answered state: null | { selected, isCorrect }

function loadWrongRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveWrongRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`无法加载: ${src}`));
    document.head.appendChild(s);
  });
}

// Each question file calls this to register its questions
window.registerQuestions = function(bankId, questions) {
  allBanks[bankId] = questions;
};

async function init() {
  for (const bank of QUESTION_BANKS) {
    try {
      await loadScript(bank.file);
    } catch (e) {
      console.warn(e.message);
    }
  }
  renderTopicBar();
  startQuiz();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function renderTopicBar() {
  const list = document.getElementById('topicList');
  const allActive = selectedTopics.size === 0 ? ' active' : '';
  let html = `<div class="sidebar-item${allActive}" data-topic="__all__" onclick="toggleTopic('__all__')">
    <span>全部</span>
    <span class="si-count">${Object.values(allBanks).reduce((s, b) => s + b.length, 0)}</span>
  </div>`;
  for (const bank of QUESTION_BANKS) {
    if (!allBanks[bank.file]) continue;
    const active = selectedTopics.has(bank.file) ? ' active' : '';
    const wrongCount = getWrongCountForBank(bank.file);
    const exportBtn = wrongCount > 0
      ? `<button class="btn-export" title="导出错题" onclick="event.stopPropagation(); exportWrongs('${bank.file}', '${bank.name}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>`
      : '';
    html += `<div class="sidebar-item${active}" data-topic="${bank.file}" onclick="toggleTopic('${bank.file}')">
      <span>${bank.name}</span>
      <span class="si-right">${wrongCount > 0 ? `<span class="si-count" style="color:#ff3b30;background:#fff0ef">${wrongCount}错</span>` : ''}<span class="si-count">${allBanks[bank.file].length}</span>${exportBtn}</span>
    </div>`;
  }
  list.innerHTML = html;

  // Update badge on menu button
  const badge = document.getElementById('bankBadge');
  const totalBanks = QUESTION_BANKS.filter(b => allBanks[b.file]).length;
  if (totalBanks > 1) {
    badge.textContent = totalBanks;
    badge.style.display = 'flex';
  }

  // Update wrong count badge
  updateWrongBadge();
}

function updateWrongBadge() {
  const records = loadWrongRecords();
  const count = Object.keys(records).length;
  const badge = document.getElementById('wrongBadge');
  if (badge) badge.textContent = count;
}

function toggleTopic(topic) {
  if (topic === '__all__') {
    selectedTopics.clear();
  } else {
    if (selectedTopics.has(topic)) selectedTopics.delete(topic);
    else selectedTopics.add(topic);
  }
  renderTopicBar();
  startQuiz();
}

function getSelectedQuestions() {
  let pool = [];
  const banks = selectedTopics.size > 0 ? [...selectedTopics] : Object.keys(allBanks);
  for (const bankId of banks) {
    if (!allBanks[bankId]) continue;
    allBanks[bankId].forEach((q, i) => {
      pool.push({ ...q, _bankId: bankId, _bankIndex: i, _globalKey: bankId + ':' + i });
    });
  }
  return pool;
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeAll').classList.toggle('active', mode === 'all');
  document.getElementById('modeWrong').classList.toggle('active', mode === 'wrong');
  updateWrongBadge();
  startQuiz();
  // Close sidebar after selection
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function startQuiz() {
  let pool = getSelectedQuestions();
  if (currentMode === 'wrong') {
    const records = loadWrongRecords();
    pool = pool.filter(q => records[q._globalKey]);
    if (pool.length === 0) {
      document.getElementById('quizArea').innerHTML =
        '<div class="card" style="text-align:center"><h2>没有错题！</h2><p style="margin-top:12px;color:#86868b">你还没有做错过任何题目。</p></div>';
      updateStats(0, 0, 0, 0);
      return;
    }
  }
  if (pool.length === 0) {
    document.getElementById('quizArea').innerHTML =
      '<div class="card" style="text-align:center"><p style="color:#86868b">没有可用的题目。</p></div>';
    updateStats(0, 0, 0, 0);
    return;
  }
  currentQuiz = document.getElementById('shuffleCheck').checked ? shuffle(pool) : pool;
  currentIndex = 0;
  rightCount = 0;
  wrongCount = 0;
  sessionWrongs = [];
  answered = new Array(currentQuiz.length).fill(null);
  renderQuestion();
}

function updateStats(cur, total, right, wrong) {
  document.getElementById('statCur').textContent = cur;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRight').textContent = right;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('progressFill').style.width = total ? (cur / total * 100) + '%' : '0%';
}

function renderQuestion() {
  if (currentIndex >= currentQuiz.length) { renderResult(); return; }
  const q = currentQuiz[currentIndex];
  const total = currentQuiz.length;
  const ans = answered[currentIndex];
  updateStats(currentIndex + 1, total, rightCount, wrongCount);

  const isAnswered = ans !== null;
  const wrongRecords = loadWrongRecords();
  const isInWrongList = !!wrongRecords[q._globalKey];

  const optionsHTML = q.options.map((opt, i) => {
    let cls = 'option';
    if (isAnswered) {
      cls += ' disabled';
      if (i === q.answer) cls += ' correct';
      if (i === ans.selected && !ans.isCorrect) cls += ' wrong';
    }
    return `<div class="${cls}" ${isAnswered ? '' : `onclick="selectOption(this, ${i})"`} data-index="${i}">${String.fromCharCode(65 + i)}. ${opt}</div>`;
  }).join('');

  const showExplanation = isAnswered && q.explanation;
  const removeBtn = isInWrongList
    ? `<button class="btn-remove-wrong" onclick="removeFromWrong('${q._globalKey}')">移除错题记录</button>`
    : '';

  const prevDisabled = currentIndex === 0 ? 'disabled' : '';
  const nextLabel = currentIndex === total - 1 ? '查看结果' : '下一题';

  document.getElementById('quizArea').innerHTML = `
    <div class="card">
      <div class="q-number">第 ${currentIndex + 1} 题 / 共 ${total} 题</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
      <div class="explanation" id="explanation" style="display:${showExplanation ? 'block' : 'none'}">${q.explanation || ''}</div>
      ${removeBtn}
    </div>
    <div class="nav-bar">
      <button class="btn-nav secondary" onclick="prevQuestion()" ${prevDisabled}>上一题</button>
      <button class="btn-nav" id="btnNext" onclick="nextQuestion()" ${isAnswered ? '' : 'disabled'}>下一题</button>
    </div>
  `;
}

function selectOption(el, selected) {
  const q = currentQuiz[currentIndex];
  const correct = q.answer;
  const isCorrect = selected === correct;

  answered[currentIndex] = { selected, isCorrect };

  if (isCorrect) {
    rightCount++;
  } else {
    wrongCount++;
    const records = loadWrongRecords();
    records[q._globalKey] = { yourAnswer: selected, date: new Date().toISOString() };
    saveWrongRecords(records);
    sessionWrongs.push({ q: q.q, yourAnswer: q.options[selected], correctAnswer: q.options[correct] });
  }

  renderQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() { currentIndex++; renderQuestion(); }

function removeFromWrong(globalKey) {
  const records = loadWrongRecords();
  delete records[globalKey];
  saveWrongRecords(records);
  updateWrongBadge();
  renderQuestion();
}

function renderResult() {
  const total = currentQuiz.length;
  const pct = total ? Math.round(rightCount / total * 100) : 0;
  updateStats(total, total, rightCount, wrongCount);

  let wrongHTML = '';
  if (sessionWrongs.length > 0) {
    wrongHTML = `<div class="wrong-list"><h3>本次错题回顾</h3>` +
      sessionWrongs.map((w, i) =>
        `<div class="wrong-item">
          <div class="wi-q">${w.q}</div>
          <div class="wi-your">你的答案：${w.yourAnswer}</div>
          <div class="wi-correct">正确答案：${w.correctAnswer}</div>
        </div>`
      ).join('') + '</div>';
  }

  const wrongRecords = loadWrongRecords();
  const totalWrongs = Object.keys(wrongRecords).length;

  document.getElementById('quizArea').innerHTML = `
    <div class="card result-card">
      <h2>测验完成！</h2>
      <div class="result-score">${pct}%</div>
      <p>${total} 题中答对 ${rightCount} 题</p>
      <p style="color:#86868b;font-size:14px;margin-top:8px">历史错题总数：${totalWrongs} 题</p>
      ${wrongHTML}
      <div class="btn-group">
        <button class="btn-next" style="display:inline-block" onclick="setMode('all');startQuiz()">重新开始</button>
        <button class="btn-secondary" onclick="setMode('wrong');startQuiz()">只做错题 (${totalWrongs})</button>
        <button class="btn-secondary" onclick="clearWrongs()">清除错题记录</button>
      </div>
    </div>
  `;
}

function getWrongCountForBank(bankId) {
  const records = loadWrongRecords();
  if (!allBanks[bankId]) return 0;
  let count = 0;
  allBanks[bankId].forEach((_, i) => {
    if (records[bankId + ':' + i]) count++;
  });
  return count;
}

function exportWrongs(bankId, bankName) {
  const records = loadWrongRecords();
  const questions = allBanks[bankId];
  if (!questions) return;

  const wrongItems = [];
  questions.forEach((q, i) => {
    const key = bankId + ':' + i;
    const record = records[key];
    if (!record) return;
    wrongItems.push({
      question: q.q,
      options: q.options.map((opt, j) => String.fromCharCode(65 + j) + '. ' + opt),
      your_answer: String.fromCharCode(65 + record.yourAnswer) + '. ' + q.options[record.yourAnswer],
      correct_answer: String.fromCharCode(65 + q.answer) + '. ' + q.options[q.answer],
      explanation: q.explanation || null
    });
  });

  if (wrongItems.length === 0) {
    showToast('该题库没有错题');
    return;
  }

  // Build Markdown
  let md = `# ${bankName} - 错题导出\n\n`;
  md += `导出时间: ${new Date().toLocaleString()}\n`;
  md += `错题数量: ${wrongItems.length}\n\n---\n\n`;
  md += `以下是我做错的题目，请帮我分析错误原因并给出详细解释。\n\n`;

  wrongItems.forEach((item, idx) => {
    md += `## 第 ${idx + 1} 题\n\n`;
    md += `**题目:** ${item.question}\n\n`;
    md += `**选项:**\n`;
    item.options.forEach(opt => { md += `- ${opt}\n`; });
    md += `\n**我的答案:** ${item.your_answer}\n`;
    md += `**正确答案:** ${item.correct_answer}\n`;
    if (item.explanation) md += `**解析:** ${item.explanation}\n`;
    md += `\n---\n\n`;
  });

  // Copy to clipboard
  navigator.clipboard.writeText(md).then(() => {
    showToast(`已复制 ${wrongItems.length} 道错题到剪贴板`);
  }).catch(() => {
    // Fallback: download as file
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${bankName}-错题.md`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`已下载 ${wrongItems.length} 道错题`);
  });
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function clearWrongs() {
  if (confirm('确定要清除所有错题记录吗？')) {
    localStorage.removeItem(STORAGE_KEY);
    updateWrongBadge();
    setMode('all');
  }
}

init();
</script>
